<main class="dashboard-shell">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <section class="top-bar" aria-label="Current date and weather">
        <app-calender></app-calender>

        <div class="weather-zone">
            <app-weather></app-weather>
        </div>
    </section>

    <button class="settings-button" type="button" aria-label="Open settings" (click)="openDialog()">
        <mat-icon>settings</mat-icon>
    </button>

    <section class="clock-stage" aria-label="Current time">
        <app-clock></app-clock>
    </section>
</main>
