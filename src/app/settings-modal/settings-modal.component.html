<div class="dialog-header" mat-dialog-title>
  <h2>Settings</h2>
  <button
    type="button"
    class="header-icon-button"
    aria-label="Toggle full screen"
    (click)="toggleFullScreen()">
    <mat-icon>{{ isFullScreen ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
  </button>
</div>
<p class="dialog-subtitle">Tune the home display without leaving the clock.</p>

<mat-dialog-content class="settings-content">
  <section class="settings-section">
    <h3>Search Your City</h3>

    <div class="search-box">
      <input
        type="text"
        [value]="searchValue"
        (keyup)="searchCities($event)"
        placeholder="Start typing a city"
        autocomplete="off">
    </div>

    <div class="city-results">
      <div class="status-text" *ngIf="isSearching">Searching cities...</div>
      <div class="status-text" *ngIf="!isSearching && (!searchValue || searchValue.length < 2)">
        Type at least 2 letters to search.
      </div>
      <div class="status-text" *ngIf="!isSearching && searchValue && searchValue.length > 1 && cityResults.length === 0">
        No cities found.
      </div>
      <button
        mat-button
        type="button"
        class="city-option"
        *ngFor="let city of cityResults"
        (click)="selectCity(city)">
        <span>{{ formatCity(city) }}</span>
      </button>
    </div>
  </section>

</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button class="action-button secondary" mat-dialog-close>Cancel</button>
  <button mat-stroked-button class="action-button primary" (click)="update()" [disabled]="!selectedCity" mat-dialog-close cdkFocusInitial>Update</button>
</mat-dialog-actions>
